<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Fav songs, fav view</h1>
    <div
      class="content"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      "
    >
      <div style="width: 100%; max-width: 800px">
        <video
          src="assets/music.mp4"
          controls
          autoplay
          loop
          muted
          width="100%"
          style="
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
          "
        ></video>
      </div>
    </div>
    <div class="back-btn">
      <button onclick="goBack()">Back</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
